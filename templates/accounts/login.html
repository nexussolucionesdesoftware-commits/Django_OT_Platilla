<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="bg-light d-flex align-items-center" style="min-height:100vh">
  <div class="container px-3 px-md-0" style="max-width:400px">
    <div class="text-center mb-4">
      <i class="bi bi-tools display-4 text-primary"></i>
      <h4 class="fw-bold mt-2">OT Sistema</h4>
      <p class="text-muted small">Gestión de Órdenes de Trabajo</p>
    </div>
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        {% if form.errors %}
        <div class="alert alert-danger alert-sm">Usuario o contraseña incorrectos.</div>
        {% endif %}
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">Usuario</label>
            <input type="text" name="username" class="form-control" autofocus required>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">Contraseña</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="bi bi-box-arrow-in-right me-1"></i>Ingresar
          </button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
